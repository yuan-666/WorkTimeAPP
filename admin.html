<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#176b5b">
    <title>管理员后台 - 明薪工时</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css?v=0.3.2">
  </head>
  <body class="admin-standalone">
    <div id="adminApp"></div>
    <script>
      const ADMIN_API_BASE = "/api/admin";
      const CLOUD_KEY_URL = "/api/cloud/key";
      const SESSION_KEY = "worktimeapp:admin-session";

      const state = {
        token: sessionStorage.getItem(SESSION_KEY) || "",
        loading: false,
        message: "",
        data: null,
        selectedUserId: ""
      };

      render();
      if (state.token) refreshSummary("已恢复管理员会话");

      document.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (event.target.id === "admin-login-form") await login(event.target);
      });

      document.addEventListener("click", async (event) => {
        const target = event.target.closest("[data-action], [data-user]");
        if (!target) return;
        if (target.dataset.user) {
          state.selectedUserId = target.dataset.user;
          render();
          return;
        }
        const action = target.dataset.action;
        if (action === "refresh") await refreshSummary("已刷新");
        if (action === "logout") logout();
        if (action === "reset-password") await updateUser("resetPassword");
        if (action === "disable-user") await updateUser("disable");
        if (action === "enable-user") await updateUser("enable");
        if (action === "save-note") await updateUser("note");
      });

      async function login(form) {
        const data = Object.fromEntries(new FormData(form));
        const username = String(data.username || "").trim();
        const password = String(data.password || "");
        if (!username || !password) {
          state.message = "请填写管理员账号和密码";
          render();
          return;
        }
        setLoading("正在登录…");
        try {
          const passwordCipher = await encryptPassword(password);
          const response = await fetch(`${ADMIN_API_BASE}/login`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ username, passwordCipher })
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result.token) throw new Error(result.error || "登录失败");
          state.token = result.token;
          sessionStorage.setItem(SESSION_KEY, result.token);
          await refreshSummary("登录成功");
        } catch (error) {
          state.loading = false;
          state.message = error.message || "登录失败";
          render();
        }
      }

      async function refreshSummary(message = "") {
        if (!state.token) {
          state.message = "请先登录管理员后台";
          render();
          return;
        }
        setLoading("正在读取用户看板…");
        try {
          const result = await adminFetch("/summary", { method: "GET" });
          state.data = result;
          const users = result.users || [];
          state.selectedUserId = users.some((user) => user.userId === state.selectedUserId)
            ? state.selectedUserId
            : (users[0]?.userId || "");
          state.loading = false;
          state.message = message;
          render();
        } catch (error) {
          state.loading = false;
          state.message = error.message || "读取失败";
          if (/登录/.test(state.message)) logout(false);
          render();
        }
      }

      async function updateUser(action) {
        const selected = currentUser();
        if (!selected) {
          state.message = "请先选择一个用户";
          render();
          return;
        }
        const payload = { action, userId: selected.userId };
        if (action === "resetPassword") {
          const password = String(document.querySelector("[name='newPassword']")?.value || "");
          if (password.length < 6) {
            state.message = "新密码至少 6 位";
            render();
            return;
          }
          payload.newPasswordCipher = await encryptPassword(password);
        }
        if (action === "note") {
          payload.note = String(document.querySelector("[name='adminNote']")?.value || "").trim();
        }
        if (action === "disable" && !confirm(`确认停用用户 ${selected.userId} 吗？`)) return;
        setLoading("正在保存…");
        try {
          await adminFetch("/user", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload)
          });
          await refreshSummary(adminActionText(action));
        } catch (error) {
          state.loading = false;
          state.message = error.message || "保存失败";
          render();
        }
      }

      async function adminFetch(path, options = {}) {
        const response = await fetch(`${ADMIN_API_BASE}${path}`, {
          ...options,
          headers: {
            ...(options.headers || {}),
            authorization: `Bearer ${state.token}`
          }
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "请求失败");
        return result;
      }

      async function encryptPassword(password) {
        if (!crypto?.subtle) throw new Error("当前浏览器不支持安全登录，请换用新版浏览器。");
        const response = await fetch(CLOUD_KEY_URL, { method: "GET", cache: "no-store" });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.publicKey) throw new Error(result.error || "安全密钥未配置");
        const publicKey = await crypto.subtle.importKey(
          "jwk",
          result.publicKey,
          { name: "RSA-OAEP", hash: "SHA-256" },
          false,
          ["encrypt"]
        );
        const encrypted = await crypto.subtle.encrypt(
          { name: "RSA-OAEP" },
          publicKey,
          new TextEncoder().encode(password)
        );
        return base64UrlBytes(new Uint8Array(encrypted));
      }

      function logout(renderAfter = true) {
        state.token = "";
        state.data = null;
        state.selectedUserId = "";
        state.message = "已退出";
        sessionStorage.removeItem(SESSION_KEY);
        if (renderAfter) render();
      }

      function setLoading(message) {
        state.loading = true;
        state.message = message;
        render();
      }

      function render() {
        const app = document.querySelector("#adminApp");
        app.innerHTML = state.token ? renderDashboard() : renderLogin();
      }

      function renderLogin() {
        return `
          <main class="admin-auth-page">
            <section class="admin-auth-card">
              <div class="brand">
                <img src="./assets/icon.svg" alt="" width="42" height="42">
                <div>
                  <strong>明薪工时后台</strong>
                  <span>用户与同步数据看板</span>
                </div>
              </div>
              <div>
                <p class="eyebrow">Admin</p>
                <h1>管理员登录</h1>
                <p class="admin-auth-copy">登录后可查看用户数量、使用情况、IP 分布，并处理改密、停用和备注。</p>
              </div>
              <form id="admin-login-form" class="tool-form">
                ${field("管理员账号", `<input name="username" type="text" autocomplete="username" required>`)}
                ${field("管理员密码", `<input name="password" type="password" autocomplete="current-password" required>`)}
                <div class="form-footer">
                  <span class="admin-status">${escapeHtml(state.message)}</span>
                  <button class="primary-button" type="submit" ${state.loading ? "disabled" : ""}>${state.loading ? "登录中" : "登录"}</button>
                </div>
              </form>
              <a class="admin-back-link" href="./index.html">返回应用</a>
            </section>
          </main>
        `;
      }

      function renderDashboard() {
        const data = state.data || {};
        const selected = currentUser();
        return `
          <div class="admin-shell">
            <aside class="admin-side">
              <div class="brand">
                <img src="./assets/icon.svg" alt="" width="38" height="38">
                <div>
                  <strong>明薪工时后台</strong>
                  <span>${data.totalUsers || 0} 个用户</span>
                </div>
              </div>
              <div class="admin-side-actions">
                <button class="primary-button" type="button" data-action="refresh" ${state.loading ? "disabled" : ""}>${state.loading ? "刷新中" : "刷新看板"}</button>
                <button class="plain-button" type="button" data-action="logout">退出登录</button>
                <a class="plain-button" href="./index.html">返回应用</a>
              </div>
              <p class="privacy-note">${escapeHtml(state.message || "管理员会话只保存在当前浏览器标签页。")}</p>
              <div class="admin-footer-mini">
                <span>© ${new Date().getFullYear()} yuan 版权所有</span>
                <a class="footer-icon-link" href="https://github.com/yuan-666/WorkTimeAPP" target="_blank" rel="noopener" aria-label="GitHub">
                  <svg width="18" height="18" aria-hidden="true"><use href="./assets/social-icons.svg#github-icon"></use></svg>
                </a>
                <a class="footer-icon-link" href="https://yuan6.cn" target="_blank" rel="noopener" aria-label="友情链接：yuan6.cn">
                  <svg width="18" height="18" aria-hidden="true"><use href="./assets/social-icons.svg#blog-icon"></use></svg>
                </a>
              </div>
            </aside>
            <main class="admin-main">
              <header class="topbar">
                <div>
                  <p class="eyebrow">Dashboard</p>
                  <h1>用户看板</h1>
                </div>
              </header>
              ${state.loading && !state.data ? renderSkeleton() : renderDashboardBody(data, selected)}
            </main>
          </div>
        `;
      }

      function renderDashboardBody(data, selected) {
        const users = data.users || [];
        return `
          <section class="metric-strip admin-metrics">
            ${metric("用户总数", data.totalUsers || 0)}
            ${metric("启用用户", data.activeUsers || 0)}
            ${metric("同步次数", data.totalSyncs || 0)}
            ${metric("登录次数", data.totalLogins || 0)}
          </section>
          <div class="admin-grid">
            <section class="admin-panel">
              <div class="panel-head compact-head">
                <div>
                  <p class="eyebrow">Users</p>
                  <h3>用户列表</h3>
                </div>
              </div>
              <div class="admin-user-list">
                ${users.map((user) => `
                  <button class="${selected?.userId === user.userId ? "is-active" : ""}" type="button" data-user="${escapeAttr(user.userId)}">
                    <strong>${escapeHtml(user.userId)}</strong>
                    <span>${statusLabel(user.status)} · ${user.entryCount || 0} 条工时 · ${formatDateTime(user.updatedAt)}</span>
                  </button>
                `).join("") || `<p class="empty">暂无用户</p>`}
              </div>
            </section>
            <section class="admin-panel">
              <div class="panel-head compact-head">
                <div>
                  <p class="eyebrow">Control</p>
                  <h3>用户操作</h3>
                </div>
              </div>
              ${selected ? renderUserControl(selected) : `<p class="empty">请选择用户</p>`}
            </section>
          </div>
          <div class="admin-grid">
            ${renderBreakdown("IP 分布", data.ipDistribution || [], "bucket")}
            ${renderBreakdown("使用事件", data.actionCounts || [], "action")}
          </div>
          <section class="admin-panel">
            <div class="panel-head compact-head">
              <div>
                <p class="eyebrow">Usage</p>
                <h3>近 30 日使用</h3>
              </div>
            </div>
            <div class="admin-usage-bars">
              ${(data.dailyUsage || []).map((day) => `
                <div>
                  <span>${escapeHtml(day.date.slice(5))}</span>
                  <i style="--height:${Math.max(6, Math.min(100, Number(day.events || 0) * 10))}%"></i>
                  <strong>${day.events || 0}</strong>
                </div>
              `).join("") || `<p class="empty">暂无使用记录</p>`}
            </div>
          </section>
        `;
      }

      function renderUserControl(user) {
        return `
          <div class="admin-user-control">
            <div class="summary-list">
              ${summaryLine("用户", escapeHtml(user.userId))}
              ${summaryLine("状态", statusLabel(user.status))}
              ${summaryLine("最近同步", formatDateTime(user.updatedAt) || "-")}
              ${summaryLine("IP 网段", escapeHtml(user.lastIPPrefix || "unknown"))}
            </div>
            <div class="form-grid">
              ${field("新密码", `<input name="newPassword" type="password" placeholder="至少 6 位">`)}
              ${field("备注", `<input name="adminNote" type="text" maxlength="200" value="${escapeAttr(user.adminNote || "")}">`)}
            </div>
            <div class="button-row cloud-actions">
              <button class="plain-button" type="button" data-action="reset-password">修改密码</button>
              ${user.status === "disabled"
                ? `<button class="primary-button" type="button" data-action="enable-user">启用用户</button>`
                : `<button class="danger-button" type="button" data-action="disable-user">停用用户</button>`}
              <button class="plain-button" type="button" data-action="save-note">保存备注</button>
            </div>
          </div>
        `;
      }

      function renderBreakdown(title, rows, keyName) {
        const max = Math.max(1, ...rows.map((row) => Number(row.count || 0)));
        return `
          <section class="admin-panel">
            <div class="panel-head compact-head">
              <div>
                <p class="eyebrow">Stats</p>
                <h3>${escapeHtml(title)}</h3>
              </div>
            </div>
            <div class="admin-breakdown">
              ${rows.map((row) => `
                <div>
                  <span>${escapeHtml(row[keyName] || "unknown")}</span>
                  <i><b style="width:${Math.max(4, Number(row.count || 0) / max * 100)}%"></b></i>
                  <strong>${row.count || 0}</strong>
                </div>
              `).join("") || `<p class="empty">暂无数据</p>`}
            </div>
          </section>
        `;
      }

      function renderSkeleton() {
        return `
          <div class="admin-dashboard">
            <div class="admin-skeleton"><i></i><i></i><i></i><i></i></div>
            <p class="empty">正在读取用户看板…</p>
          </div>
        `;
      }

      function currentUser() {
        const users = state.data?.users || [];
        return users.find((user) => user.userId === state.selectedUserId) || users[0] || null;
      }

      function adminActionText(action) {
        return ({
          resetPassword: "已修改用户密码",
          disable: "已停用用户",
          enable: "已启用用户",
          note: "已保存备注"
        })[action] || "已保存";
      }

      function statusLabel(status) {
        return status === "disabled" ? "已停用" : "启用中";
      }

      function field(label, control) {
        return `<label class="field"><span>${escapeHtml(label)}</span>${control}</label>`;
      }

      function metric(label, value) {
        return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${value}</strong></div>`;
      }

      function summaryLine(label, value) {
        return `<div><span>${escapeHtml(label)}</span><strong>${value}</strong></div>`;
      }

      function formatDateTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      }

      function base64UrlBytes(bytes) {
        let binary = "";
        for (const byte of bytes) binary += String.fromCharCode(byte);
        return btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
